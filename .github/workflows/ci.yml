name: CI

on:
  pull_request:
    branches:
      - '**'  # All branches (excludes nothing; master PRs also get CI)

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-lambda
        if: steps.release.outputs.release_created == 'true'
        run: cargo binstall cargo-lambda

      - name: Build
        run: cargo build

      - name: Run tests
        run: make test

      - name: Build lambda artifacts
        if: steps.release.outputs.release_created == 'true'
        run: make lambda release