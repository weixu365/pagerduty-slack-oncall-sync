name: release-please

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'  # All branches (excludes nothing; master PRs also get CI)
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to release from (non-master will use beta prerelease config)
        required: true
        default: master

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          command: manifest
          config-file: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch != 'master' && 'release-please-config-beta.json' || 'release-please-config.json' }}
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || 'master' }}

      - name: Checkout code
        if: steps.release.outputs.release_created == 'true' || github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: cargo-bins/cargo-binstall@main

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Install cargo-lambda
        run: cargo binstall cargo-lambda --no-confirm

      - name: Build lambda artifacts
        run: make lambda release test

      - name: Upload lambda artifacts to GitHub Release
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            target/lambda/slack_request_handler_lambda.zip \
            target/lambda/update_user_groups_lambda.zip \
            target/release/update_user_groups \
            --clobber
