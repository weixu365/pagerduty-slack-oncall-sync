# SAM CLI configuration
# Run `sam deploy --guided` to create this file interactively, or customize below.
# See: https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html

version = 0.1

[default.deploy.parameters]
stack_name = "on-call-support-dev"
region = "ap-southeast-2"
parameter_overrides = "Stage=dev"
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = false
resolve_s3 = true
s3_prefix = "on-call-support"
tags = [
  "Name=On-Call Support Slack Bot",
  "Project=on-call-support-slack-bot",
  "ServiceName=on-call-support",
  "Environment=dev"
]

[default.build.parameters]
cached = true
parallel = true
